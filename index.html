<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Vinyl Suite"/>
<meta name="theme-color" content="#0f0f0f"/>
<title>Vinyl Suite</title>
<style>
:root{--gold:#f4a261;--gold2:#e76f51;--bg:#0f0f0f;--card:#1a1a1a;--border:#252525;--dim:#444;--muted:#888}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:#fff;font-family:Georgia,serif;min-height:100vh;overscroll-behavior:none}
button,input,textarea,select{font-family:inherit;outline:none}
input,textarea,select{color:#fff}
select option{background:#1a1a1a}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
#hdr{position:sticky;top:0;z-index:50;background:#111;border-bottom:1px solid var(--border);padding:env(safe-area-inset-top,0) 0 0}
#hdr-inner{max-width:700px;margin:0 auto;padding:14px 18px 0}
#hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
#tabs{display:flex;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:8px 14px;font-size:12px;color:var(--dim);white-space:nowrap;transition:all .15s;cursor:pointer}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:700}
#body{max-width:700px;margin:0 auto;padding:24px 18px 100px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.card{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .15s}
.card:active{transform:scale(.96)}
.card-img-wrap{position:relative}
.card-img,.card-ph{width:100%;aspect-ratio:1;display:block}
.card-img{object-fit:cover}
.card-ph{display:flex;align-items:center;justify-content:center;font-size:34px;background:linear-gradient(135deg,#111,#1e1e1e)}
.yr-badge{position:absolute;top:6px;right:6px;font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;color:#000}
.card-info{padding:9px 10px}
.card-title{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:10px;color:var(--dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbox{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px}
.tag{background:var(--card);color:#bbb;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;border:none;display:inline-block}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.sbox2{background:var(--card);border-radius:14px;padding:16px 18px;border:1px solid var(--border)}
.sv{font-size:30px;font-weight:900;color:var(--gold)}
.sl{font-size:12px;font-weight:700;margin-top:2px}
.ss{font-size:10px;color:var(--dim);margin-top:1px}
.section-hdr{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-bottom:14px}
.bar-row{margin-bottom:9px}
.bar-top{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.bar-trk{height:5px;background:#2a2a2a;border-radius:3px}
.bar-fill{height:100%;border-radius:3px;background:var(--gold)}
.dec-bars{display:flex;gap:6px;align-items:flex-end;height:80px}
.dbc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.db{width:100%;border-radius:4px}
.list-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
@keyframes sp{to{transform:rotate(360deg)}}
.disc{border-radius:50%;background:radial-gradient(circle,#111 25%,#252525 26%,#111 34%,#1e1e1e 35%,#0a0a0a 60%,#111 61%);border:3px solid #2a2a2a;display:flex;align-items:center;justify-content:center}
.disc.spin{animation:sp 1.8s linear infinite}
.ddot{border-radius:50%;background:var(--gold);border:2px solid #111}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:50px;padding:13px 44px;font-size:15px;font-weight:800;box-shadow:0 4px 24px rgba(244,162,97,.35);cursor:pointer}
.btn-g:disabled{background:#222;color:#555;box-shadow:none}
.btn-f{width:100%;border-radius:12px;padding:13px;font-size:14px;font-weight:800;border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;box-shadow:0 4px 20px rgba(244,162,97,.3);cursor:pointer}
.btn-f:disabled{background:#222;color:#555;box-shadow:none}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.chip{background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:20px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.chip.on{border-color:var(--gold);background:rgba(244,162,97,.12);color:var(--gold)}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:none;align-items:flex-end;justify-content:center}
#modal.open{display:flex}
@keyframes su{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
#modal-inner{background:#161616;border-radius:22px 22px 0 0;width:100%;max-width:700px;max-height:92vh;overflow-y:auto;animation:su .28s ease}
#mhero{position:relative;height:220px;overflow:hidden;background:#0a0a0a}
#mbg{width:100%;height:100%;object-fit:cover;filter:brightness(.4) blur(2px);transform:scale(1.05);display:block}
#mgrad{position:absolute;inset:0;background:linear-gradient(to top,#161616 0%,transparent 55%)}
#mcls{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.65);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer}
#minfo{position:absolute;bottom:0;left:0;padding:0 20px 18px;display:flex;gap:14px;align-items:flex-end}
#mcover{width:70px;height:70px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#111}
#mbody{padding:20px 20px 44px}
.slbl{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--gold);margin-bottom:10px}
.cur{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.cnum{width:22px;height:22px;border-radius:50%;background:var(--gold);color:#000;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.ibox{background:var(--card);border-radius:12px;padding:14px 16px;border:1px solid var(--border)}
.de{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.spinner{display:inline-block;width:26px;height:26px;border:3px solid #333;border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite}
.dform{background:var(--card);border-radius:16px;padding:18px;margin-bottom:20px;border:1px solid rgba(244,162,97,.2)}
.field{width:100%;background:#111;border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:12px;color:#fff}
textarea.field{resize:vertical;min-height:80px}
.hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px;margin-bottom:12px}
.hcard{background:#111;border:1px solid var(--border);border-radius:10px;padding:7px;cursor:pointer;text-align:center}
.hcard.sel{border-color:var(--gold);background:rgba(244,162,97,.1)}
.hcard img,.hcard .hph{width:100%;aspect-ratio:1;border-radius:6px;display:block}
.hph{display:flex;align-items:center;justify-content:center;font-size:22px;background:#1e1e1e}
.hlbl{font-size:9px;color:#aaa;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prow{display:flex;gap:10px;align-items:center;background:#111;border-radius:10px;padding:10px;margin-bottom:12px}
.prow img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0}
.empty{text-align:center;padding:60px 0;color:var(--dim)}
.mtbox{background:rgba(244,162,97,.08);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--gold);font-style:italic;margin-bottom:12px}

/* Gallery */
.gallery{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;margin-bottom:16px}
.gallery::-webkit-scrollbar{display:none}
.gallery-img{width:72px;height:72px;object-fit:cover;border-radius:8px;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:border-color .2s;opacity:.7}
.gallery-img.active{border-color:#f4a261;opacity:1}
.gallery-img:hover{opacity:1}

/* Tracklist */
.tracklist{margin-top:18px}
.track-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #222;font-size:13px}
.track-pos{width:24px;text-align:right;color:#555;font-size:11px;flex-shrink:0}
.track-title{flex:1;color:#ccc}
.track-dur{color:#555;font-size:11px;flex-shrink:0}

/* Sort buttons */
.sort-btn{background:transparent;border:1px solid #252525;color:#555;border-radius:20px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:Georgia,serif;white-space:nowrap;flex-shrink:0}
.sort-btn.on{border-color:#f4a261;background:rgba(244,162,97,.12);color:#f4a261}

/* Spotify */
#spotify-wrap{margin-bottom:18px;border-radius:12px;overflow:hidden;display:none}
#spotify-wrap iframe{display:block;border-radius:12px}
.spotify-btn{display:inline-flex;align-items:center;gap:8px;background:#1DB954;color:#000;border:none;border-radius:20px;padding:8px 18px;font-size:12px;font-weight:800;cursor:pointer;font-family:Georgia,serif;margin-bottom:16px;text-decoration:none}

/* Diary v2 */
.stars{display:flex;gap:6px;margin:10px 0}
.star{font-size:26px;cursor:pointer;color:#333;transition:color .15s;line-height:1;background:none;border:none;padding:0}
.star.on{color:#f4a261}
.de2{background:#1a1a1a;border-radius:14px;padding:14px 16px;border:1px solid #252525;margin-bottom:10px;cursor:pointer}
.de2-top{display:flex;gap:12px;align-items:flex-start}
.de2-stars{font-size:15px;margin-top:3px}
.de2-nota{font-size:12px;color:#aaa;line-height:1.5;margin-top:6px}
.stat-card{background:#1a1a1a;border-radius:14px;padding:16px 18px;border:1px solid #252525;margin-bottom:12px}
.stat-card-title{font-size:10px;color:#888;font-weight:700;letter-spacing:1px;margin-bottom:12px}
.top-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #252525}
.top-num{width:20px;font-size:11px;color:#555;flex-shrink:0;text-align:right}
.top-info{flex:1;min-width:0}
.top-title{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-sub{font-size:10px;color:#555}
.top-stars{font-size:12px;color:#f4a261;flex-shrink:0}
.diary-tabs{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;scrollbar-width:none}
.diary-tabs::-webkit-scrollbar{display:none}
.dtab{background:transparent;border:1px solid #252525;color:#555;border-radius:20px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;font-family:Georgia,serif;white-space:nowrap;flex-shrink:0}
.dtab.on{border-color:#f4a261;background:rgba(244,162,97,.12);color:#f4a261}
.reg-btn{display:flex;align-items:center;justify-content:center;background:rgba(244,162,97,.12);color:#f4a261;border:1px solid rgba(244,162,97,.3);border-radius:20px;padding:9px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:Georgia,serif;margin-top:14px;width:100%}
.mini-reg{background:#1a1a1a;border-radius:14px;padding:16px;border:1px solid rgba(244,162,97,.2);margin-top:14px}
.mini-reg-title{font-size:10px;color:#888;font-weight:700;letter-spacing:1px;margin-bottom:12px}
.fld{width:100%;background:#111;border:1px solid #252525;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:12px;color:#fff;font-family:Georgia,serif}
textarea.fld{resize:vertical;min-height:70px}
</style>
</head>

const CC={};
async function covData(id){
  if(CC[id]!==undefined)return CC[id];
  try{
    const r=await fetch('/api/covers?id='+id);
    const d=await r.json();
    CC[id]={url:d.url||null,images:d.images||[],tracklist:d.tracklist||[]};
    return CC[id];
  }catch{CC[id]={url:null,images:[],tracklist:[]};return CC[id];}
}
async function cov(id){
  const d=await covData(id);return d.url;
}
function dc(y){
  if(!y)return'#adb5bd';const n=parseInt(y);
  if(n<1970)return'#e63946';if(n<1980)return'#f4a261';if(n<1990)return'#e9c46a';
  if(n<2000)return'#8ecae6';if(n<2010)return'#a8dadc';if(n<2020)return'#06d6a0';return'#8338ec';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
let curTab='coleccion', spinActive=false, iaMood='', iaEra='', diaryPicked=null;

function go(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['coleccion','ruleta','stats','ia','diario'][i]===t));
  ['coleccion','ruleta','stats','ia','diario'].forEach(n=>document.getElementById('p-'+n).style.display=n===t?'':'none');
  if(t==='coleccion')rCol();
  if(t==='ruleta')rRul();
  if(t==='stats')rStats();
  if(t==='ia')rIA();
  if(t==='diario')rDiario();
}

// IMG helper
function imgDiv(id,w,h,r,onclick){
  const d=document.createElement('div');
  d.style.cssText='width:'+w+'px;height:'+h+'px;border-radius:'+r+'px;background:#111;flex-shrink:0;overflow:hidden;'+(onclick?'cursor:pointer':'');
  if(onclick)d.onclick=onclick;
  covData(id).then(data=>{if(data.url&&d.isConnected){const i=document.createElement('img');i.src=data.url;i.style.cssText='width:100%;height:100%;object-fit:cover;display:block';d.appendChild(i);}});
  return d;
}

// MODAL
function openModal(r){
  document.getElementById('mt').textContent=r.t;
  document.getElementById('ma').textContent=r.a;
  const tags=document.getElementById('mtags');tags.innerHTML='';
  if(r.y){const s=document.createElement('span');s.className='tag';s.style.background=dc(r.y);s.style.color='#000';s.textContent=r.y;tags.appendChild(s);}
  if(r.f){const s=document.createElement('span');s.className='tag';s.textContent=r.f.split(',')[0];tags.appendChild(s);}
  document.getElementById('mc').innerHTML='<div style="text-align:center;padding:40px 0"><div class="spinner"></div><p style="color:#555;font-size:13px;margin-top:14px">Buscando información…</p></div>';
  // Reset register form
  const oldForm=document.getElementById('modal-reg-form');if(oldForm)oldForm.remove();
  regRecord=null;regRating=0;
  document.getElementById('mbg').src='';
  document.getElementById('mgallery').innerHTML='';
  document.getElementById('mgallery-main-wrap').style.display='none';
  document.getElementById('mtracklist').innerHTML='';
  covData(r.id).then(d=>{
    if(d.url){document.getElementById('mbg').src=d.url;}
    const mainWrap=document.getElementById('mgallery-main-wrap');
    const mainImg=document.getElementById('mgallery-main');
    if(d.images&&d.images.length>0){
      mainWrap.style.display='block';
      mainImg.src=d.images[0];
    }
    if(d.images&&d.images.length>1){
      const gal=document.getElementById('mgallery');
      d.images.forEach((url,i)=>{
        const img=document.createElement('img');
        img.className='gallery-img'+(i===0?' active':'');
        img.src=url;img.alt='';
        img.onclick=()=>{
          mainImg.src=url;
          document.getElementById('mbg').src=url;
          document.querySelectorAll('.gallery-img').forEach(x=>x.classList.remove('active'));
          img.classList.add('active');
        };
        gal.appendChild(img);
      });
    }
    if(d.tracklist&&d.tracklist.length>0){
      const tl=document.getElementById('mtracklist');
      let h='<div class="slbl" style="margin-top:18px">TRACKLIST</div><div class="tracklist">';
      d.tracklist.forEach(t=>{
        if(t.title) h+='<div class="track-row"><span class="track-pos">'+esc(t.pos||'')+'</span><span class="track-title">'+esc(t.title)+'</span><span class="track-dur">'+esc(t.duration||'')+'</span></div>';
      });
      h+='</div>';
      tl.innerHTML=h;
    }
  }).catch(()=>{});
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
  // Spotify
  document.getElementById('spotify-wrap').style.display='none';
  document.getElementById('spotify-iframe').src='';
  fetch('/api/spotify?artist='+encodeURIComponent(r.a)+'&title='+encodeURIComponent(r.t))
    .then(x=>x.json()).then(d=>{
      if(d.id){document.getElementById('spotify-iframe').src='https://open.spotify.com/embed/album/'+d.id+'?utm_source=generator&theme=0';document.getElementById('spotify-wrap').style.display='block';}
    }).catch(()=>{});
  const p='Eres un experto en música. Busca información sobre el álbum "'+r.t+'" de '+r.a+(r.y?' ('+r.y+')':'')+'.\nResponde SOLO en JSON sin markdown:\n{"descripcion":"2-3 frases","curiosidades":["c1","c2","c3"],"grabacion":"dónde/cuándo/productor","legado":"impacto cultural"}';
  console.log('Calling curiosidades API...');
  try {
    async function fetchCuriosidades(attempt){
      try{
        const x=await fetch('/api/curiosidades',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,messages:[{role:'user',content:p}]})});
        const d=await x.json();
        const txt=(d.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
        const parsed=JSON.parse(txt);
        renderModal(parsed,r);
      }catch(e){
        if(attempt<2){setTimeout(()=>fetchCuriosidades(attempt+1),1500);}
        else{document.getElementById('mc').innerHTML='<p style="color:#555;text-align:center;padding:20px">No se pudo cargar la información.</p>';}
      }

var curSort='date';
function setSort(s){
  curSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('on'));
  var el=document.getElementById('sort-'+s);
  if(el)el.classList.add('on');

function fCol(){
  const q=(document.getElementById('csrch')?.value||'').toLowerCase();
  let f=q?COL.filter(r=>(r.t+' '+r.a).toLowerCase().includes(q)):COL.slice();
  f.sort((a,b)=>{
    if(curSort==='artist') return (a.a+a.t).localeCompare(b.a+b.t,'es');
    if(curSort==='year') return (parseInt(b.y)||0)-(parseInt(a.y)||0);
    if(curSort==='title') return a.t.localeCompare(b.t,'es');
    return (b.d||'').localeCompare(a.d||'');
  });
  document.getElementById('cc').textContent=f.length+' discos';
  const g=document.getElementById('cgrid');g.innerHTML='';
  f.forEach(r=>{
    const color=dc(r.y);
    const card=document.createElement('div');card.className='card';card.onclick=()=>openModal(r);

    covData(r.id).then(d=>{const u=d.url;if(u){const img=document.createElement('img');img.className='card-img';img.src=u;img.alt='';ph.replaceWith(img);}});
    const badge=document.createElement('span');badge.className='yr-badge';badge.style.background=color;badge.textContent=r.y||'?';iw.appendChild(badge);
    const info=document.createElement('div');info.className='card-info';
    info.innerHTML='<div class="card-title">'+esc(r.t)+'</div><div class="card-sub">'+esc(r.a)+'</div>';
    card.appendChild(iw);card.appendChild(info);g.appendChild(card);
  });
}

function tMood(m){iaMood=iaMood===m?'':m;document.querySelectorAll('#mchips .chip').forEach(b=>{b.classList.toggle('on',b.textContent===iaMood);b.style.cssText='';}); }
function tEra(d,c){iaEra=iaEra===d?'':d;document.querySelectorAll('#echips .chip').forEach(b=>{const on=b.textContent===iaEra;b.classList.toggle('on',on);b.style.cssText=on?'border-color:'+c+';background:'+c+'20;color:'+c:'';}); }
async function askIA(){
  const btn=document.getElementById('iabtn'),res=document.getElementById('iares');
  btn.disabled=true;btn.textContent='Pensando…';res.style.display='none';res.innerHTML='';
  // Shuffle to get different recommendations each time

  const sample=shuffled.slice(0,30).map(r=>'"'+r.t+'" de '+r.a).join(', ');
  const p='Eres un experto en música. El usuario tiene esta colección de vinilos: '+sample+'.\n'+(iaMood?'Estado de ánimo: '+iaMood+'.':'')+(iaEra?' Le apetece música de los '+iaEra+'.':'')+' Recomienda UN disco de su colección que encaje perfectamente ahora.\nResponde SOLO en JSON sin markdown:\n{"title":"...","artist":"...","razon":"2-3 frases íntimas","momento":"descripción poética del momento ideal"}';
  try{
    const resp=await fetch('/api/curiosidades',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,messages:[{role:'user',content:p}]})});
    const data=await resp.json();
    const txt=(data.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(txt);
    const match=COL.find(r=>r.t.toLowerCase().includes(parsed.title.toLowerCase().slice(0,10))||parsed.title.toLowerCase().includes(r.t.toLowerCase().slice(0,10)));
    const color=dc(match?.y);
    res.style.cssText='display:block;margin-top:24px;background:var(--card);border-radius:20px;overflow:hidden;border:1px solid '+color+'44;'+(match?'cursor:pointer':'');
    if(match)res.onclick=()=>openModal(match);
    let h='';
    if(match){
      const iw=document.createElement('div');iw.style.cssText='background:#111';
      covData(match.id).then(d=>{const u=d.url;if(u){const img=document.createElement('img');img.src=u;img.style.cssText='width:100%;max-height:220px;object-fit:cover;display:block';iw.appendChild(img);}});
      res.appendChild(iw);
    }
    const bd=document.createElement('div');bd.style.padding='18px 20px';
    bd.innerHTML='<div style="font-size:10px;color:var(--gold);font-weight:700;letter-spacing:1.2px;margin-bottom:8px">✦ MI RECOMENDACIÓN</div><div style="font-size:19px;font-weight:800">'+esc(parsed.title)+'</div><div style="font-size:13px;color:#888;margin:3px 0 14px">'+esc(parsed.artist)+'</div><p style="font-size:13px;color:#ccc;line-height:1.65;margin-bottom:12px">'+esc(parsed.razon)+'</p><div class="mtbox">🕯 '+esc(parsed.momento)+'</div>'+(match?'<div style="font-size:12px;color:var(--dim);font-weight:600">Toca para ver curiosidades →</div>':'');
    res.appendChild(bd);
  }catch{res.style.display='block';res.innerHTML='<p style="color:#e63946;text-align:center;padding:20px">Error. Inténtalo de nuevo.</p>';}
  btn.disabled=false;btn.textContent='✦ Recomiéndame algo';
}

    const srch=document.createElement('input');srch.className='fld';srch.id='dsrch';srch.placeholder='T\u00edtulo o artista...';srch.oninput=fDS;div.appendChild(srch);
    const hits=document.createElement('div');hits.className='hgrid';hits.id='dhits';hits.style.display='none';div.appendChild(hits);
    const dprow=document.createElement('div');dprow.id='dprow';dprow.style.display='none';div.appendChild(dprow);
  } else {
    const prow=document.createElement('div');prow.style.cssText='display:flex;gap:10px;align-items:center;background:#111;border-radius:10px;padding:10px;margin-bottom:12px';
    const imgd=document.createElement('div');imgd.style.cssText='width:44px;height:44px;border-radius:8px;background:#222;overflow:hidden;flex-shrink:0';
    covData(prefill.id).then(function(d){if(d.url){const img=document.createElement('img');img.src=d.url;img.style.cssText='width:100%;height:100%;object-fit:cover';imgd.appendChild(img);}});
    prow.appendChild(imgd);
    const inf=document.createElement('div');inf.innerHTML='<div style="font-size:13px;font-weight:700">'+esc(prefill.t)+'</div><div style="font-size:11px;color:#666">'+esc(prefill.a)+'</div>';
    prow.appendChild(inf);div.appendChild(prow);
  }
  const rlbl=document.createElement('div');rlbl.style.cssText='font-size:10px;color:#666;font-weight:700;letter-spacing:1px;margin:4px 0 4px';rlbl.textContent='VALORACI\u00d3N';div.appendChild(rlbl);
  const stars=document.createElement('div');stars.className='stars';stars.id='reg-stars';
  for(var i=1;i<=5;i++){
    (function(n){const s=document.createElement('button');s.className='star';s.textContent='☆';s.onclick=function(){setRating(n);};stars.appendChild(s);})(i);
  }
  div.appendChild(stars);
  const nota=document.createElement('textarea');nota.className='fld';nota.id='dnota';nota.placeholder='Notas opcionales...';div.appendChild(nota);
  const btn=document.createElement('button');btn.className='btn-f';btn.textContent='Guardar escucha';btn.onclick=saveDE;div.appendChild(btn);
  wrap.appendChild(div);
}

function setRating(n){
  regRating=n;
  document.querySelectorAll('#reg-stars .star').forEach(function(s,i){s.classList.toggle('on',i<n);s.textContent=i<n?'★':'☆';});
}

function fDS(){
  const srch=document.getElementById('dsrch');
  const q=srch?srch.value.toLowerCase():'';
  const hits=document.getElementById('dhits');regRecord=null;
  const dprow=document.getElementById('dprow');if(dprow)dprow.style.display='none';
  if(!q){hits.style.display='none';hits.innerHTML='';return;}
  const f=COL.filter(function(r){return (r.t+' '+r.a).toLowerCase().indexOf(q)>=0;}).slice(0,16);
  hits.innerHTML='';hits.style.display=f.length?'grid':'none';
  f.forEach(function(r){
    const c=document.createElement('div');c.className='hcard';
    const ph=document.createElement('div');ph.className='hph';ph.textContent='🎵';c.appendChild(ph);
    const lbl=document.createElement('div');lbl.className='hlbl';lbl.textContent=r.t;c.appendChild(lbl);
    (function(rec,placeholder){covData(rec.id).then(function(d){if(d.url){const img=document.createElement('img');img.src=d.url;img.style.cssText='width:100%;aspect-ratio:1;border-radius:6px;object-fit:cover;display:block';if(placeholder.parentNode)placeholder.parentNode.replaceChild(img,placeholder);}});})(r,ph);
    (function(rec){c.onclick=function(){selDP(rec);};})(r);
    hits.appendChild(c);
  });
}

function selDP(r){
  regRecord=r;
  const dprow=document.getElementById('dprow');dprow.style.display='flex';dprow.className='prow';
  dprow.innerHTML='<div style="width:44px;height:44px;border-radius:8px;background:#111;overflow:hidden;flex-shrink:0"><img id="dpimg" src="" style="width:100%;height:100%;object-fit:cover"/></div><div><div style="font-size:13px;font-weight:700">'+esc(r.t)+'</div><div style="font-size:11px;color:#666">'+esc(r.a)+'</div></div>';
  covData(r.id).then(function(d){const img=document.getElementById('dpimg');if(d.url&&img)img.src=d.url;});
  document.getElementById('dhits').style.display='none';
  const dsrch=document.getElementById('dsrch');if(dsrch)dsrch.value=r.t;
}

function saveDE(){
  if(!regRecord){alert('Selecciona un disco primero');return;}
  const nota=document.getElementById('dnota');
  const entry={id:Date.now(),record:regRecord,rating:regRating,nota:nota?nota.value:'',date:new Date().toISOString()};
  diary=[entry].concat(diary);saveDiary(diary);diaryCurTab='log';
  const fw=document.getElementById('diary-form-wrap');if(fw)fw.style.display='none';
  const mf=document.getElementById('modal-reg-form');if(mf)mf.style.display='none';
  rDiario();
}

function renderDiaryStats(el){
  if(!diary.length){el.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:10px">📊</div><div>Sin datos a\u00fan</div></div>';return;}
  const counts={};
  diary.forEach(function(e){if(e.record){const k=e.record.id;if(!counts[k])counts[k]={n:0,r:e.record};counts[k].n++;}});
  const topPlays=Object.values(counts).sort(function(a,b){return b.n-a.n;}).slice(0,5);
  const dates=[...new Set(diary.map(function(e){return e.date.slice(0,10);}))].sort().reverse();
  let streak=0;const today=new Date().toISOString().slice(0,10);let check=today;
  for(const d of dates){if(d===check){streak++;const dt=new Date(check);dt.setDate(dt.getDate()-1);check=dt.toISOString().slice(0,10);}else break;}
  const rated=diary.filter(function(e){return e.rating>0;});
  const avgRating=rated.length?(Math.round(rated.reduce(function(a,e){return a+e.rating;},0)/rated.length*10)/10).toFixed(1):'-';
  const last=diary[0];
  let h='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">';
  h+='<div class="sbox2"><div class="sv">'+diary.length+'</div><div class="sl">escuchas</div></div>';
  h+='<div class="sbox2"><div class="sv">'+streak+'</div><div class="sl">racha d\u00edas</div></div>';
  h+='<div class="sbox2"><div class="sv">'+avgRating+'</div><div class="sl">valoraci\u00f3n</div></div></div>';
  if(last)h+='<div class="stat-card"><div class="stat-card-title">\u00daltimo escuchado</div><div style="font-size:14px;font-weight:700">'+esc(last.record&&last.record.t||'')+'</div><div style="font-size:12px;color:#555;margin-top:2px">'+esc(last.record&&last.record.a||'')+'</div><div style="font-size:15px;margin-top:6px">'+starsHTML(last.rating||0)+'</div></div>';
  h+='<div class="stat-card"><div class="stat-card-title">M\u00e1s escuchados</div>';
  topPlays.forEach(function(item,i){h+='<div class="top-row"><span class="top-num">'+(i+1)+'</span><div class="top-info"><div class="top-title">'+esc(item.r.t)+'</div><div class="top-sub">'+esc(item.r.a)+'</div></div><span style="color:#f4a261;font-size:11px;font-weight:700">x'+item.n+'</span></div>';});
  h+='</div>';el.innerHTML=h;
}

function renderDiaryTop(el){
  const rated=diary.filter(function(e){return e.rating>0;});
  if(!rated.length){el.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:10px">🏆</div><div>A\u00fan no hay discos valorados</div></div>';return;}
  const ratings={};
  rated.forEach(function(e){const k=e.record&&e.record.id;if(!k)return;if(!ratings[k])ratings[k]={r:e.record,total:0,n:0};ratings[k].total+=e.rating;ratings[k].n++;});
  const top=Object.values(ratings).map(function(x){return Object.assign({},x,{avg:x.total/x.n});}).sort(function(a,b){return b.avg-a.avg;}).slice(0,10);
  let h='<div class="stat-card"><div class="stat-card-title">Top 10 mejor valorados</div>';
  top.forEach(function(item,i){h+='<div class="top-row"><span class="top-num">'+(i+1)+'</span><div class="top-info"><div class="top-title">'+esc(item.r.t)+'</div><div class="top-sub">'+esc(item.r.a)+'</div></div><span class="top-stars">'+starsHTML(Math.round(item.avg))+'</span></div>';});
  h+='</div>';el.innerHTML=h;
}

function renderDiaryNew(el){
  const listened=new Set(diary.map(function(e){return e.record&&e.record.id;}).filter(Boolean));
  const unlistened=COL.filter(function(r){return !listened.has(r.id);});
  el.innerHTML='<div style="font-size:13px;color:#555;margin-bottom:16px">'+unlistened.length+' discos que a\u00fan no has registrado</div><div class="grid" id="new-grid"></div>';
  const grid=document.getElementById('new-grid');
  unlistened.forEach(function(r){
    const color=dc(r.y);const card=document.createElement('div');card.className='card';
    (function(rec){card.onclick=function(){openModal(rec);};})(r);
    const iw=document.createElement('div');iw.className='card-img-wrap';
    const ph=document.createElement('div');ph.className='card-ph';ph.textContent='🎵';iw.appendChild(ph);
    (function(rec,placeholder,wrap){covData(rec.id).then(function(d){if(d.url){const img=document.createElement('img');img.className='card-img';img.src=d.url;img.alt='';if(placeholder.parentNode===wrap)wrap.replaceChild(img,placeholder);}});})(r,ph,iw);
    const badge=document.createElement('span');badge.className='yr-badge';badge.style.background=color;badge.textContent=r.y||'?';iw.appendChild(badge);
    const info=document.createElement('div');info.className='card-info';
    info.innerHTML='<div class="card-title">'+esc(r.t)+'</div><div class="card-sub">'+esc(r.a)+'</div>';
    card.appendChild(iw);card.appendChild(info);grid.appendChild(card);
  });
}

function quickRegister(record){
  regRecord=record;regRating=0;
  const existing=document.getElementById('modal-reg-form');
  if(existing){existing.style.display=existing.style.display==='none'?'block':'none';return;}
  const form=document.createElement('div');form.id='modal-reg-form';form.className='mini-reg';
  const title=document.createElement('div');title.className='mini-reg-title';title.textContent='REGISTRAR ESTA ESCUCHA';
  const rlbl=document.createElement('div');rlbl.style.cssText='font-size:10px;color:#666;font-weight:700;letter-spacing:1px;margin-bottom:6px';rlbl.textContent='VALORACI\u00d3N';
  const stars=document.createElement('div');stars.className='stars';stars.id='qreg-stars';
  for(var i=1;i<=5;i++){
    (function(n){const s=document.createElement('button');s.className='star';s.textContent='☆';s.onclick=function(){setQRating(n);};stars.appendChild(s);})(i);
  }
  const nota=document.createElement('textarea');nota.className='fld';nota.id='qnota';nota.placeholder='Notas opcionales...';nota.style.marginTop='10px';
  const btn=document.createElement('button');btn.className='btn-f';btn.textContent='Guardar escucha';btn.onclick=saveQuickEntry;
  form.appendChild(title);form.appendChild(rlbl);form.appendChild(stars);form.appendChild(nota);form.appendChild(btn);
  const mc=document.getElementById('mc');if(mc&&mc.parentNode)mc.parentNode.insertBefore(form,mc);
}

function setQRating(n){
  regRating=n;
  document.querySelectorAll('#qreg-stars .star').forEach(function(s,i){s.classList.toggle('on',i<n);s.textContent=i<n?'★':'☆';});
}

function saveQuickEntry(){
  if(!regRecord)return;
  const nota=document.getElementById('qnota');
  const entry={id:Date.now(),record:regRecord,rating:regRating,nota:nota?nota.value:'',date:new Date().toISOString()};
  diary=[entry].concat(diary);saveDiary(diary);
  const form=document.getElementById('modal-reg-form');
  if(form){form.innerHTML='<div style="text-align:center;padding:14px;color:#f4a261;font-weight:700">✅ Escucha registrada!</div>';setTimeout(function(){form.style.display='none';},1500);}
}


// Init
rCol();
</script>
