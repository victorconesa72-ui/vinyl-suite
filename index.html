<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0f0f0f;color:#fff;font-family:Georgia,serif}
#hdr{position:sticky;top:0;background:#111;border-bottom:1px solid #222;z-index:50}
#hdr-in{max-width:700px;margin:0 auto;padding:14px 18px 0}
#logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
#logo-t{font-size:16px;font-weight:800}
#logo-s{font-size:10px;color:#444;margin-top:2px}
#tabs{display:flex;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:8px 14px;font-size:12px;color:#555;white-space:nowrap;cursor:pointer;font-family:Georgia,serif}
.tab.on{color:#f4a261;border-bottom-color:#f4a261;font-weight:700}
#main{max-width:700px;margin:0 auto;padding:24px 18px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.card{background:#1a1a1a;border-radius:12px;overflow:hidden;border:1px solid #252525;cursor:pointer}
.card:active{opacity:.8}
.cimgw{position:relative}
.cimg{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#111}
.cph{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:34px;background:#1a1a1a}
.cbadge{position:absolute;top:6px;right:6px;font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;color:#000}
.cinfo{padding:9px 10px}
.ctitle{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cartist{font-size:10px;color:#555;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbox{width:100%;background:#1a1a1a;border:1px solid #252525;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;color:#fff;font-family:Georgia,serif}
@keyframes sp{to{transform:rotate(360deg)}}
.disc{border-radius:50%;background:radial-gradient(circle,#111 25%,#252525 26%,#111 34%,#1e1e1e 35%,#0a0a0a 60%,#111 61%);border:3px solid #2a2a2a;display:flex;align-items:center;justify-content:center}
.spin{animation:sp 1.8s linear infinite}
.ddot{border-radius:50%;background:#f4a261;border:2px solid #111}
.btng{background:linear-gradient(135deg,#f4a261,#e76f51);color:#000;border:none;border-radius:50px;padding:13px 44px;font-size:15px;font-weight:800;cursor:pointer;font-family:Georgia,serif}
.btng:disabled{background:#222;color:#555}
.btnf{width:100%;border-radius:12px;padding:13px;font-size:14px;font-weight:800;border:none;background:linear-gradient(135deg,#f4a261,#e76f51);color:#000;cursor:pointer;font-family:Georgia,serif}
.btnf:disabled{background:#222;color:#555}
.chip{background:transparent;border:1px solid #252525;color:#555;border-radius:20px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:Georgia,serif;margin:0 6px 8px 0}
.chip.on{border-color:#f4a261;background:rgba(244,162,97,.12);color:#f4a261}

#modal.open{display:flex}
#min{background:#161616;border-radius:22px 22px 0 0;width:100%;max-width:700px;max-height:92vh;overflow-y:auto;border-top:3px solid #f4a261}
#mhero{position:relative;height:200px;overflow:hidden;background:#0a0a0a}
#mbg{width:100%;height:100%;object-fit:cover;filter:brightness(.4) blur(2px);transform:scale(1.05);display:block}
#mgrad{position:absolute;inset:0;background:linear-gradient(to top,#161616,transparent 55%)}
#mcls{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.7);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer}
#minfo{position:absolute;bottom:0;left:0;padding:0 18px 16px;display:flex;gap:12px;align-items:flex-end}
#mcover{width:64px;height:64px;border-radius:10px;object-fit:cover;background:#111;flex-shrink:0}
#mbody{padding:18px 18px 44px}
.slbl{font-size:10px;font-weight:700;letter-spacing:1px;color:#f4a261;margin-bottom:10px}
.spin2{display:inline-block;width:26px;height:26px;border:3px solid #333;border-top-color:#f4a261;border-radius:50%;animation:sp .8s linear infinite}
.sbox2{background:#1a1a1a;border-radius:14px;padding:16px 18px;border:1px solid #252525;margin-bottom:12px}
.sv{font-size:30px;font-weight:900;color:#f4a261}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.brow{margin-bottom:9px}
.btop{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.btrk{height:5px;background:#2a2a2a;border-radius:3px}
.bfil{height:100%;border-radius:3px;background:#f4a261}
.dcols{display:flex;gap:6px;align-items:flex-end;height:80px}
.dcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px}
.dbar{width:100%;border-radius:4px}
.lrow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #222;font-size:12px}
.de{background:#1a1a1a;border-radius:14px;padding:14px;border:1px solid #252525;display:flex;gap:12px;margin-bottom:10px}
.dform{background:#1a1a1a;border-radius:16px;padding:18px;margin-bottom:20px;border:1px solid rgba(244,162,97,.2)}
.fld{width:100%;background:#111;border:1px solid #252525;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:12px;color:#fff;font-family:Georgia,serif}
textarea.fld{resize:vertical;min-height:80px}
.hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px;margin-bottom:12px}
.hcard{background:#111;border:1px solid #252525;border-radius:10px;padding:7px;cursor:pointer;text-align:center}
.hcard.sel{border-color:#f4a261;background:rgba(244,162,97,.1)}
.hph{width:100%;aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:22px;background:#1e1e1e}
.hlbl{font-size:9px;color:#aaa;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prow{display:flex;gap:10px;align-items:center;background:#111;border-radius:10px;padding:10px;margin-bottom:12px}
.mtbox{background:rgba(244,162,97,.08);border-radius:10px;padding:10px 14px;font-size:12px;color:#f4a261;font-style:italic;margin-bottom:12px}
.empty{text-align:center;padding:60px 0;color:#444}
.cur{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.cnum{width:22px;height:22px;border-radius:50%;background:#f4a261;color:#000;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.ibox{background:#1a1a1a;border-radius:12px;padding:14px 16px;border:1px solid #252525}
.tag{background:#1a1a1a;color:#bbb;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block;margin-right:6px;margin-top:6px}

// IA
function rIA(){
var moods=[‘Chill’,‘Energético’,‘Melancólico’,‘Fiesta’,‘Íntimo’,‘Épico’,‘Nocturno’,‘Alegre’];
var eras=[‘60s’,‘70s’,‘80s’,‘90s’,‘00s’,‘10s’,‘20s’];
var EC={‘60s’:’#e63946’,‘70s’:’#f4a261’,‘80s’:’#e9c46a’,‘90s’:’#8ecae6’,‘00s’:’#a8dadc’,‘10s’:’#06d6a0’,‘20s’:’#8338ec’};
var h=’<div style="max-width:480px;margin:0 auto"><h2 style="font-size:22px;font-weight:800;margin-bottom:6px">Recomendador IA</h2><p style="color:#555;font-size:13px;margin-bottom:24px">Cuéntame cómo estás y te digo qué poner</p>’;

h+=’</div>’;
h+=’<div style="font-size:10px;color:#666;font-weight:700;letter-spacing:1px;margin-bottom:10px">ÉPOCA</div><div style="margin-bottom:20px" id="echips">’;
for(var i=0;i<eras.length;i++){var c=EC[eras[i]];h+=’<button class="chip'+(iaEra===eras[i]?' on':'')+'" style="'+(iaEra===eras[i]?'border-color:'+c+';background:'+c+'20;color:'+c:'')+'" onclick="tEra(''+eras[i]+'',''+c+'')">’+eras[i]+’</button>’;}

}
function tMood(m){iaMood=iaMood===m?’’:m;var chips=document.querySelectorAll(’#mchips .chip’);for(var i=0;i<chips.length;i++){chips[i].classList.toggle(‘on’,chips[i].textContent===iaMood);chips[i].style.cssText=’’;}}
function tEra(d,c){iaEra=iaEra===d?’’:d;var chips=document.querySelectorAll(’#echips .chip’);for(var i=0;i<chips.length;i++){var on=chips[i].textContent===iaEra;chips[i].classList.toggle(‘on’,on);chips[i].style.cssText=on?‘border-color:’+c+’;background:’+c+‘20;color:’+c:’’;}}
function askIA(){
var btn=document.getElementById(‘iabtn’),res=document.getElementById(‘iares’);
btn.disabled=true;btn.textContent=‘Pensando…’;res.style.display=‘none’;
var sample=COL.slice(0,60).map(function(r){return’”’+r.t+’” de ‘+r.a+’ (’+(r.y||’?’)+’)’;}).join(’; ‘);
var p=‘Eres un experto en música. Colección: ‘+sample+’.’+(iaMood?’ Estado de ánimo: ‘+iaMood+’.’:’’)+(iaEra?’ Época preferida: ‘+iaEra+’.’:’’)+’ Recomienda UN disco de su colección. Responde SOLO en JSON sin markdown: {“title”:”…”,“artist”:”…”,“razon”:“2-3 frases”,“momento”:“descripción poética”}’;
fetch(‘https://api.anthropic.com/v1/messages’,{method:‘POST’,headers:{‘Content-Type’:‘application/json’},
body:JSON.stringify({model:‘claude-sonnet-4-20250514’,max_tokens:400,messages:[{role:‘user’,content:p}]})
}).then(function(r){return r.json();}).then(function(data){
var txt=(data.content||[]).map(function(b){return b.text||’’;}).join(’’).replace(/`json|`/g,’’).trim();
try{
var parsed=JSON.parse(txt);
var match=null;
for(var i=0;i<COL.length;i++){if(COL[i].t.toLowerCase().indexOf(parsed.title.toLowerCase().slice(0,8))>=0||parsed.title.toLowerCase().indexOf(COL[i].t.toLowerCase().slice(0,8))>=0){match=COL[i];break;}}
var color=match?dc(match.y):’#f4a261’;
res.style.cssText=‘display:block;background:#1a1a1a;border-radius:20px;overflow:hidden;border:1px solid ‘+color+‘44;’+(match?‘cursor:pointer’:’’);
if(match)res.onclick=function(){openM(match);};
var inner=’’;
if(match){inner+=’<div id="iaimg" style="background:#111;min-height:10px"></div>’;}
inner+=’<div style="padding:18px 20px">’;
inner+=’<div class="slbl">✦ MI RECOMENDACIÓN</div>’;
inner+=’<div style="font-size:19px;font-weight:800">’+esc(parsed.title)+’</div>’;

}catch(e){res.style.display=‘block’;res.innerHTML=’<p style="color:#e63946;text-align:center;padding:20px">Error al parsear respuesta.</p>’;}
}).catch(function(){res.style.display=‘block’;res.innerHTML=’<p style="color:#e63946;text-align:center;padding:20px">Error de conexión.</p>’;});
btn.disabled=false;btn.textContent=‘✦ Recomiéndame algo’;
}

// DIARIO
function rDia(){
var el=document.getElementById(‘p-dia’);
var h=’<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px"><div><h2 style="font-size:22px;font-weight:800;margin:0">Diario</h2><p style="color:#555;font-size:12px;margin-top:3px">’+diary.length+’ sesión’+(diary.length!==1?‘es’:’’)+’ guardada’+(diary.length!==1?‘s’:’’)+’</p></div><button class="btnf" style="width:auto;padding:9px 16px;font-size:12px;border-radius:10px" onclick="tDForm()">+ Registrar</button></div>’;

function deH(e){

return ‘<div class="de"><div id=“dei-’+e.id+’” style=“width:54px;height:54px;border-radius:8px;background:#111;flex-shrink:0;overflow:hidden;cursor:pointer” ‘+(e.record?‘onclick=‘openM(’+rc+’)’’:’’)+’></div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">’+esc(e.record?e.record.t:’-’)+’</div><div style="font-size:11px;color:#555">’+esc(e.record?e.record.a:’’)+’</div><div style="font-size:10px;color:#444;margin-top:2px">’+d+’</div>’+(e.nota?’<p style="font-size:12px;color:#aaa;line-height:1.5;margin:8px 0 0">’+esc(e.nota)+’</p>’:’’)+’</div><button onclick="delDE('+e.id+')" style="background:none;border:none;color:#444;font-size:16px;cursor:pointer;padding:0">✕</button></div>’;
}
function loadDeImg(e){cov(e.record.id,function(u){var w=document.getElementById(‘dei-’+e.id);if(u&&w){var img=document.createElement(‘img’);img.src=u;img.style.cssText=‘width:100%;height:100%;object-fit:cover’;w.appendChild(img);}});}

var dFOpen=false;
function tDForm(){

function fDS(){

document.getElementById(‘dprow’).style.display=‘none’;
var sb=document.getElementById(‘dsb’);sb.disabled=true;sb.style.cssText=‘background:#222;color:#555’;

(function(r){

function saveDE(){
