// ── Cover cache usando Discogs API ───────────────────────────────────────────
const coverCache = {};
async function fetchCover(release_id) {
if (coverCache[release_id] !== undefined) return coverCache[release_id];
try {
const r = await fetch(`https://api.discogs.com/releases/${release_id}`, {
headers: { “Authorization”: `Discogs token=${TOKEN}`, “User-Agent”: “VinylSuite/1.0” }
});
const d = await r.json();
const url = d.images?.[0]?.uri || d.thumb || null;
coverCache[release_id] = url;
return url;
} catch { coverCache[release_id] = null; return null; }
}

// ── Colores por década ───────────────────────────────────────────────────────
const DECADE_COLORS = {“60s”:”#e63946”,“70s”:”#f4a261”,“80s”:”#e9c46a”,“90s”:”#8ecae6”,“00s”:”#a8dadc”,“10s”:”#06d6a0”,“20s”:”#8338ec”,“25+”:”#fb5607”};
function decadeColor(year) {
if (!year) return “#adb5bd”;
const y = parseInt(year);
if (y < 1970) return DECADE_COLORS[“60s”];
if (y < 1980) return DECADE_COLORS[“70s”];
if (y < 1990) return DECADE_COLORS[“80s”];
if (y < 2000) return DECADE_COLORS[“90s”];
if (y < 2010) return DECADE_COLORS[“00s”];
if (y < 2020) return DECADE_COLORS[“10s”];
return DECADE_COLORS[“20s”];
}

function AlbumCover({ record, size = 56, radius = 10, style = {} }) {
const [src, setSrc] = useState(null);
const [err, setErr] = useState(false);
useEffect(() => {
let alive = true;
fetchCover(record.release_id).then(url => { if (alive) setSrc(url); });
return () => { alive = false; };
}, [record.release_id]);

const color = decadeColor(record.year);
const sizeStyle = typeof size === “number” ? { width: size, height: size } : { width: “100%”, aspectRatio: “1” };

if (src && !err) return <img src={src} onError={() => setErr(true)} alt=””
style={{ …sizeStyle, borderRadius: radius, objectFit: “cover”, flexShrink: 0, …style }} />;

return <div style={{ …sizeStyle, borderRadius: radius, background: `linear-gradient(135deg, #1a1a1a, ${color}44)`,
display: “flex”, alignItems: “center”, justifyContent: “center”,
fontSize: typeof size === “number” ? size * 0.38 : 32, flexShrink: 0, …style }}>🎵</div>;
}

function Tag({ label, color, dark }) {
return <span style={{ background: color || (dark ? “#2a2a2a” : “#1c1c1e”), color: dark ? “#000” : “#bbb”,
padding: “3px 12px”, borderRadius: 20, fontSize: 11, fontWeight: 700 }}>{label}</span>;
}

}, [record.release_id]);

return (

// ── CSV Import ────────────────────────────────────────────────────────────────
function CsvImportBanner({ onImport }) {
const ref = useRef();
const handle = e => {
const file = e.target.files[0];
if (!file) return;
const reader = new FileReader();
reader.onload = ev => {
try {
const lines = ev.target.result.split(”\n”);
const headers = lines[0].split(”,”).map(h => h.replace(/”/g, “”).trim());
const records = lines.slice(1).filter(l => l.trim()).map(line => {
const cols = line.match(/(”.*?”|[^,]+)(?=,|$)/g) || [];
const obj = {};
headers.forEach((h, i) => obj[h] = (cols[i] || “”).replace(/”/g, “”).trim());
return {
catalog: obj[“Catalog#”] || “”, artist: obj[“Artist”] || “”, title: obj[“Title”] || “”,
label: obj[“Label”] || “”, format: obj[“Format”] || “”, year: obj[“Released”] || “”,
release_id: obj[“release_id”] || “”, date_added: (obj[“Date Added”] || “”).slice(0, 10)
};
}).filter(r => r.release_id);
onImport(records);
} catch {}
};
reader.readAsText(file);
};
return (
<div style={{ background: “#1c1c1e”, borderRadius: 12, padding: “12px 16px”, marginBottom: 16,
border: “1px solid #2a2a2a”, display: “flex”, alignItems: “center”, justifyContent: “space-between”, gap: 12 }}>
<div style={{ fontSize: 12, color: “#666” }}>¿Tienes un CSV más reciente de Discogs?</div>
<button onClick={() => ref.current.click()} style={{
background: “transparent”, border: “1px solid #2a2a2a”, color: “#888”,
borderRadius: 8, padding: “6px 12px”, fontSize: 11, fontWeight: 600, cursor: “pointer”, whiteSpace: “nowrap”
}}>Actualizar CSV</button>
<input ref={ref} type=“file” accept=”.csv” onChange={handle} style={{ display: “none” }} />
</div>
);
}
